name: "Cluster"
description: |
  Stress test: ALL 5 ground-truth victims are in the NW quadrant (x<0,
  y>0). Tests whether the auction biases drones toward one sector
  (drone2 will get all the INVESTIGATE tasks; the other three should
  keep scanning their own arcs uninterrupted thanks to the
  max_concurrent_investigations=1 cap). Expected outcome: roughly the
  same time-to-confirm for the 5 victims as Default, because only one
  drone services them anyway.

  NOTE: ground_truth positions here are SYNTHETIC — they do not match the
  default world's actual victim bodies. The detector won't find them;
  this scenario is mainly useful for testing the SCHEDULER, not the
  detection rate. To use the cluster geometry for real, swap the world
  SDF too (out of scope for now).

launch:
  num_drones: 4
  coverage_pattern: spiral_out

mission:
  mission_radius: 70.0
  inner_radius: 5.0
  # NOTE: see default.yaml, JSONL metadata only.
  survey_altitude: 25.0
  camera_footprint_m: 35.0
  coverage_overlap: 0.85
  investigate_confidence_floor: 0.90
  max_concurrent_investigations: 1
  reject_age_seconds: 60.0
  mission_timeout_seconds: 600.0

detection:
  confidence_floor: 0.65
  dbscan_eps_m: 6.0
  confirmation_threshold: 0.80

ground_truth_victims:
  - {id: 1, position: [-15.0, 15.0, 0.0]}
  - {id: 2, position: [-22.0, 22.0, 0.0]}
  - {id: 3, position: [-30.0, 30.0, 0.0]}
  - {id: 4, position: [-12.0, 36.0, 0.0]}
  - {id: 5, position: [-8.0, 28.0, 0.0]}
