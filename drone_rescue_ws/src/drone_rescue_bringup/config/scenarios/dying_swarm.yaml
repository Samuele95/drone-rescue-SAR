name: "DyingSwarm"
description: |
  Resilience stress test: drone3 has 3× battery drain. Around t≈10 min
  drone3's drone_health_monitor will flag battery_critical, mission_manager
  marks it DOWN, _reassign_sector partitions its remaining waypoints across
  the survivors, and the cross-sector handover kicks in for any candidate
  in drone3's old NW sector. JSONL summary should show
  drone_down_events including drone3 and sector_reassignments >= 1.

launch:
  num_drones: 4
  coverage_pattern: spiral_out

mission:
  mission_radius: 70.0
  inner_radius: 5.0
  # NOTE: see default.yaml, JSONL metadata only.
  survey_altitude: 25.0
  camera_footprint_m: 35.0
  coverage_overlap: 0.85
  investigate_confidence_floor: 0.90
  max_concurrent_investigations: 1
  reject_age_seconds: 60.0
  mission_timeout_seconds: 900.0   # longer, gives time for handover

detection:
  confidence_floor: 0.65
  dbscan_eps_m: 6.0
  confirmation_threshold: 0.80

# 3× the default 0.0005 base drain → drone3 loses 100% in ~11 min instead
# of ~33 min. battery_monitor accepts this as a per-instance param; the
# scenario_loader injects it via launch param overrides.
drone_overrides:
  drone3:
    base_drain_rate: 0.0015

ground_truth_victims:
  - {id: 1, position: [44.0, 38.0, 0.0]}
  - {id: 2, position: [32.0, -28.0, 0.0]}
  - {id: 3, position: [-12.0, 16.0, 0.0]}
  - {id: 4, position: [55.0, 48.0, 0.0]}
  - {id: 5, position: [-8.0, 34.0, 0.0]}
