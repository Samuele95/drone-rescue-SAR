# Drone parameters for the rescue simulation

# --- Drone Physical Parameters ---
drone:
  mass: 1.5  # kg
  max_velocity: 5.0  # m/s
  max_acceleration: 2.0  # m/s^2
  max_angular_velocity: 3.0  # rad/s

# --- Battery Parameters ---
battery:
  initial_level: 1.0  # 100%
  capacity: 5000.0  # mAh equivalent (arbitrary units)
  base_drain_rate: 0.001  # per second at hover
  wind_drain_multiplier: 1.2  # extra drain in windy conditions
  storm_drain_multiplier: 1.5  # extra drain in storm
  low_battery_threshold: 0.2  # 20% - trigger return to base
  critical_battery_threshold: 0.1  # 10% - emergency land

# --- Sensor Parameters ---
sensors:
  camera:
    width: 640
    height: 480
    fov: 60.0  # degrees
    update_rate: 30.0  # Hz

  lidar:
    max_range: 50.0  # meters
    min_range: 0.5  # meters
    samples_horizontal: 360
    samples_vertical: 16
    update_rate: 10.0  # Hz
    range_noise_stddev: 0.01  # meters

  imu:
    update_rate: 100.0  # Hz

  gps:
    update_rate: 10.0  # Hz
    horizontal_noise_stddev: 0.5  # meters
    vertical_noise_stddev: 1.0  # meters

# --- Flight Parameters ---
flight:
  default_altitude: 30.0  # meters AGL (above ground level)
  min_altitude: 10.0  # meters AGL
  max_altitude: 100.0  # meters AGL
  safety_margin: 5.0  # meters above obstacles
  scan_speed: 3.0  # m/s during survey
  return_speed: 5.0  # m/s when returning to base

# --- Control Parameters ---
control:
  position_p_gain: 2.0
  position_d_gain: 0.5
  velocity_p_gain: 2.7
  attitude_p_gain: 2.0
  angular_rate_p_gain: 0.4

# --- Wind Model ---
# The Gazebo wind topic is unbridged, so drone_controller models the wind in
# software (lib/domain/wind): it adds (disturbance_gain - compensation_gain) *
# wind to the world-frame velocity command while airborne. Wind only acts when
# the scenario's weather is windy (wind vector non-zero). These are the
# canonical defaults; drone_controller reads them as ROS params (the
# multi_drone_simulation launch sets compensation 0.5 for partial station-keeping).
wind:
  disturbance_gain: 1.0   # how strongly the wind pushes the drone (0 = inert)
  compensation_gain: 0.5  # station-keeping; 0 = full drift, 1 = hold station

# --- Fleet Heterogeneity ---
# Per-drone capability weights feed the auction utility
# (utility = priority * capability / distance), so a more-capable drone (faster,
# or a better sensor) is preferred for a task. mission_manager reads these as the
# `drone_capabilities` ROS param, a double array aligned with drone_names. An
# empty list (default) = a homogeneous fleet (every weight 1.0, no change).
# Example heterogeneous fleet of four:
#   ros2 launch ... drone_capabilities:='[1.0, 1.3, 0.8, 1.0]'
heterogeneity:
  drone_capabilities: []   # [] = uniform; else one weight per drone
